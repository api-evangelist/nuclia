specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Nuclia
providerId: nuclia
created: '2026-06-20'
modified: '2026-06-20'
reconciled: false
tags:
- AI
- RAG
- Search
- Knowledge Base
- Unstructured Data
- Rate Limiting
- Quotas
- Throttling
description: >-
  Nuclia enforces plan-based quotas rather than published per-second request
  limits. The primary metered resource is the Nuclia token (consumed by
  processing, search, generative answers and stored indexed data), bounded by
  the monthly token allowance of the subscription plan. Indexed data is capped
  by the plan's GB / resource quota, and file size by a per-file maximum.
  Per-endpoint request throttling, when applied, returns HTTP 429. Specific
  numeric request-rate limits are not publicly reconciled in this artifact.
notes: >-
  Verify any per-endpoint request-rate limits and current plan token / storage
  quotas in the Nuclia dashboard and pricing page on reconciliation; quotas
  change between Starter, Pro and Enterprise tiers.
sources:
- https://nuclia.com/pricing/
- https://www.progress.com/agentic-rag/pricing
- https://docs.nuclia.dev/docs
responseCodes:
  throttled: 429
limits:
- name: Monthly Token Allowance
  scope: account
  metric: tokens
  limit: see plan (e.g. 10,000/month on Starter and Pro)
  notes: Tokens above the plan allowance are billed at $0.008 per token.
- name: Indexed Data Quota
  scope: account
  metric: storage
  limit: see plan (5GB/15,000 resources Starter, 25GB/80,000 resources Pro)
  notes: Each extra GB of indexed data is priced at 500 tokens/month.
- name: Knowledge Boxes
  scope: account
  metric: knowledge_boxes
  limit: see plan (1 Starter, 2 Pro, custom Enterprise)
  notes: Pro allows up to 8 Knowledge Boxes at $750/month extra each.
- name: Max File Size
  scope: request
  metric: file_size
  limit: see plan (750MB Starter, 1.5GB Pro, unlimited Enterprise)
  notes: Per-file ingestion limit; large files should use TUS resumable upload.
- name: Request Throttling
  scope: account
  metric: requests
  limit: see provider documentation
  notes: Per-endpoint request throttling may apply and returns HTTP 429.
policies:
- name: Quota-Based Limits
  description: Usage is bounded by plan token and storage quotas; overage is billed per token.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor Retry-After on 429 responses.
maintainers:
