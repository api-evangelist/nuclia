description: >-
  FinOps view of Nuclia (Progress Agentic RAG) spend. Nuclia bills a flat
  monthly subscription per plan (Starter, Pro, Enterprise) that bundles a
  Knowledge Box count, an indexed-data quota and a monthly Nuclia token
  allowance. The token is the unit of consumption across processing, search,
  generative answers and stored indexed data; usage above the allowance is
  billed at $0.008 per token, and each extra GB of indexed data costs 500
  tokens/month. Additional Knowledge Boxes on Pro cost $750/month each.
notes: >-
  Subscription prices, token allowances and the per-token overage rate are
  subject to change; verify against the Nuclia / Progress pricing page during
  reconciliation.
