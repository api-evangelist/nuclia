meters:
- name: subscription_fee
  description: Flat monthly subscription fee per plan (Starter, Pro, Enterprise).
  unit: month
  aggregation: sum
  dimensions:
  - account
  - plan
- name: included_tokens
  description: Monthly Nuclia token allowance bundled with the subscription plan.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - plan
- name: overage_tokens
  description: Tokens consumed above the plan allowance, billed at $0.008 per token.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - knowledge_box
- name: indexed_data
  description: Indexed data stored; extra GB beyond the plan quota costs 500 tokens/month per GB.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - knowledge_box
- name: extra_knowledge_boxes
  description: Additional Knowledge Boxes beyond the plan allowance ($750/month each on Pro).
  unit: knowledge_boxes
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track token consumption and indexed-data growth per Knowledge Box in the Nuclia dashboard.
- name: Allocation
  description: Map Knowledge Boxes and service-account keys to teams / workloads and internal cost centers.
- name: Optimization
  description: Prune stale resources to free indexed-data quota; right-size the plan to the token allowance; consolidate workloads into fewer Knowledge Boxes where possible.
- name: Accountability
  description: Assign owners per Knowledge Box; review monthly token overage and storage against budget.
